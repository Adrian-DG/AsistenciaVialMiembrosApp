<canvas class="canvas" #canvas style="touch-action: none"></canvas>
<div class="col">
	<ion-button expand="block" color="light" (click)="clear()"
		>Borrar</ion-button
	>
	<ion-button
		expand="block"
		color="primary"
		[disabled]="isCanvasBlank()"
		(click)="save()"
		>Guardar</ion-button
	>
</div>
